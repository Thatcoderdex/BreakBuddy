name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from manifest
        id: version
        run: |
          VERSION="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("manifest.json").read_text(encoding="utf-8"))
          print(manifest["version"])
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        run: |
          mkdir -p dist
          zip -r "dist/BreakBuddy-${{ steps.version.outputs.version }}.zip" \
            manifest.json \
            background.js \
            content.css \
            content.js \
            icon-16.png \
            icon-48.png \
            icon-128.png \
            options.html \
            options.js \
            popup.html \
            popup.js \
            ui.css

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: break-buddy-extension-${{ steps.version.outputs.version }}
          path: dist/BreakBuddy-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Break Buddy v${{ steps.version.outputs.version }}
          files: dist/BreakBuddy-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
