<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Buddy</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body class="popup-body">
    <main class="panel popup-panel">
      <p class="eyebrow">Break Buddy</p>
      <h1>Stay human while you browse</h1>

      <label class="toggle-row">
        <span>Reminders</span>
        <input id="enabled" type="checkbox">
      </label>

      <label class="field">
        <span>Interval</span>
        <select id="intervalMinutes">
          <option value="20">20 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
          <option value="90">90 min</option>
        </select>
      </label>

      <div class="status-card">
        <span>Next reminder</span>
        <strong id="nextPromptAt">Loading...</strong>
      </div>

      <div class="status-card">
        <span>Breaks completed today</span>
        <strong id="todayBreakCount">0</strong>
      </div>

      <div class="status-card stats-grid-card">
        <div>
          <span>Current streak</span>
          <strong id="currentStreak">0 days</strong>
        </div>
        <div>
          <span>Best streak</span>
          <strong id="bestStreak">0 days</strong>
        </div>
      </div>

      <section class="insight-card">
        <span class="section-label">Balance</span>
        <div id="balanceChart" class="balance-chart"></div>
      </section>

      <section class="insight-card">
        <span class="section-label">Recent history</span>
        <div id="historyList" class="history-list"></div>
      </section>

      <div class="button-row">
        <button id="sendTest" class="primary-button" type="button">Send full-screen test</button>
        <button id="openOptions" class="ghost-button" type="button">More settings</button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
